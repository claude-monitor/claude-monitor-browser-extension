<!DOCTYPE html>
<!--
  OG/social image source for the landing page (dev only, not shipped).
  Render at exactly 1200x630:
    chrome --headless --window-size=1200,630 --screenshot=og-image.png file:///.../og_image.html
  Copy the PNG to the landing repo as og-image.png.
-->
<html lang="en"><head><meta charset="utf-8"><title>og</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    background:radial-gradient(120% 140% at 80% 0%,#33231a 0%,#1a1310 55%,#120e0b 100%);
    color:#f4eee7;display:flex;align-items:center;padding:0 80px;gap:70px;
    -webkit-font-smoothing:antialiased;
  }
  .left{flex:1;min-width:0}
  .brand{display:flex;align-items:center;gap:16px;margin-bottom:36px}
  .logo{width:56px;height:56px;background:#d97757;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.45)}
  .logo svg{width:34px;height:34px}
  .brand-name{font-size:26px;font-weight:600;letter-spacing:-.01em}
  h1{font-size:64px;font-weight:700;letter-spacing:-.03em;line-height:1.06;margin-bottom:24px}
  p{font-size:25px;line-height:1.5;color:#cbbfb3;max-width:560px}
  .right{width:360px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
  .card{background:#1e1916;border:1px solid #352c26;border-radius:14px;padding:18px 20px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .t{font-size:16px;font-weight:600;color:#b9ada1}
  .v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
  .g{color:#5bc98c}.y{color:#f2b53c}
  .track{height:8px;background:#322820;border-radius:99px;overflow:hidden}
  .fill{height:100%;border-radius:99px}
  .fg{background:#5bc98c}.fy{background:#f2b53c}
  .foot{font-size:14px;color:#9c9286;margin-top:10px}
</style></head>
<body>
  <div class="left">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 20 20" fill="none"><polyline points="2,10 5,10 7.5,5 10,15 12.5,7 15,10 18,10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="brand-name">Claude Usage Monitor</span>
    </div>
    <h1>Your Claude limits, at a glance</h1>
    <p>Session, weekly &amp; per-model usage in your toolbar — free, open source, Chrome &amp; Firefox.</p>
  </div>
  <div class="right">
    <div class="card">
      <div class="row"><span class="t">Current Session</span><span class="v g">34%</span></div>
      <div class="track"><div class="fill fg" style="width:34%"></div></div>
    </div>
    <div class="card">
      <div class="row"><span class="t">Weekly · all models</span><span class="v y">64%</span></div>
      <div class="track"><div class="fill fy" style="width:64%"></div></div>
      <div class="foot">Fable draws down 2&times; faster than Opus</div>
    </div>
    <div class="card">
      <div class="row"><span class="t">Opus weekly</span><span class="v g">28%</span></div>
      <div class="track"><div class="fill fg" style="width:28%"></div></div>
    </div>
  </div>
</body></html>
