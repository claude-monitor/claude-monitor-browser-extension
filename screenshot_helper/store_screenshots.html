<!DOCTYPE html>
<!--
  Store-screenshot generator (dev only, not shipped).
  Renders the real popup (mirrors claudetrack/popup.css) composed on a 1280x800
  stage. Parametrized by ?shot=hero|high|menu|themes.

  Regenerate the store PNGs by running, from the repo root:
      powershell -ExecutionPolicy Bypass -File Generate_screenshots.ps1
  That renders every shot via headless Chrome and writes the canonical set to
  screenshots/ (01-overview, 02-themes, 03-display-options, 04-high-usage).
  Keep the inlined CSS in sync with claudetrack/popup.css (tokens, compact cards, footer).
-->
<html lang="en"><head><meta charset="utf-8"><title>stage</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1280px;height:800px;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}

  /* ===== popup component (mirrors claudetrack/popup.css) ===== */
  .popup{
    --bg-0:#15110e;--bg-1:#1e1916;--bg-2:#271f1b;--bg-3:#322820;--border:#352c26;--border-lt:#45392f;
    --text-pri:#f4eee7;--text-sec:#b9ada1;--text-dim:#9c9286;
    --accent:#d97757;--accent-bright:#ea9576;--accent-ink:#1b1410;
    --green:#5bc98c;--yellow:#f2b53c;--red:#f0655a;--radius:12px;--radius-sm:8px;
    width:320px;background:var(--bg-0);color:var(--text-pri);font-size:13px;line-height:1.5;
    border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);-webkit-font-smoothing:antialiased;
  }
  .popup.t-slate{--bg-0:#0d0f13;--bg-1:#151921;--bg-2:#1d222c;--bg-3:#283040;--border:#273040;--border-lt:#39455c;--text-pri:#e9edf3;--text-sec:#a4aebe;--text-dim:#7f8a9a;--accent:#4a9eff;--accent-bright:#74b6ff;--accent-ink:#04121f}
  .popup.t-violet{--bg-0:#0d0d10;--bg-1:#16161d;--bg-2:#1e1e28;--bg-3:#26263a;--border:#2e2e44;--border-lt:#3a3a58;--text-pri:#e8e8f0;--text-sec:#a6aac6;--text-dim:#8b8fb0;--accent:#8250dc;--accent-bright:#a875f5;--accent-ink:#fff}
  .popup.t-midnight{--bg-0:#050507;--bg-1:#0e0e11;--bg-2:#16161b;--bg-3:#1f1f28;--border:#20202b;--border-lt:#2f2f3c;--text-pri:#f5f5f8;--text-sec:#b6b9c4;--text-dim:#8a8e9c;--accent:#d97757;--accent-bright:#ea9576;--accent-ink:#1b1410}
  .popup.t-paper{--bg-0:#fff;--bg-1:#faf9f7;--bg-2:#f1efeb;--bg-3:#e8e3dc;--border:#e7e2db;--border-lt:#d8d1c8;--text-pri:#1c1813;--text-sec:#6b6258;--text-dim:#756b5f;--accent:#b85a36;--accent-bright:#a8481f;--accent-ink:#fff;--green:#15803d;--yellow:#b45309;--red:#c81e1e}
  .popup.t-cool{--bg-0:#fff;--bg-1:#f8f9fb;--bg-2:#eff2f6;--bg-3:#e5e9ef;--border:#e6e9ef;--border-lt:#d3d9e2;--text-pri:#16181d;--text-sec:#5b6470;--text-dim:#6b7280;--accent:#4f46e5;--accent-bright:#4338ca;--accent-ink:#fff;--green:#15803d;--yellow:#b45309;--red:#c81e1e}

  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 11px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .header-left{display:flex;align-items:center;gap:9px;min-width:0}
  .logo{width:26px;height:26px;flex-shrink:0;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .logo svg{width:16px;height:16px}
  .title-block{display:flex;flex-direction:column;gap:1px;min-width:0}
  .app-name{font-size:13px;font-weight:600;color:var(--text-pri);letter-spacing:-.01em;white-space:nowrap}
  .meta-row{display:flex;align-items:center;gap:6px}
  .app-version{font-size:10px;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .plan-badge{font-size:9.5px;font-weight:700;color:var(--accent-bright);background:color-mix(in srgb,var(--accent) 16%,transparent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);border-radius:4px;padding:1px 5px;letter-spacing:.03em;white-space:nowrap}
  .header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .pill{height:28px;display:flex;align-items:center;padding:0 8px;background:var(--bg-2);border:1px solid var(--border-lt);border-radius:var(--radius-sm);color:var(--text-sec);font-size:11px;gap:6px}
  .icon-btn{width:28px;height:28px;border:1px solid var(--border-lt);border-radius:var(--radius-sm);background:var(--bg-2);display:flex;align-items:center;justify-content:center;color:var(--text-sec)}
  .icon-btn svg{width:15px;height:15px}

  .cards{display:flex;flex-direction:column;gap:8px;padding:9px 14px}
  .card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
  .card-title-row{display:flex;align-items:center;gap:6px;color:var(--text-sec)}
  .card-title-row svg{flex-shrink:0;opacity:.7;color:var(--text-sec);width:12px;height:12px}
  .card-title{font-size:12px;font-weight:600;letter-spacing:-.005em;color:var(--text-sec)}
  .card-pct{font-size:21px;font-weight:700;letter-spacing:-.02em;color:var(--text-pri);line-height:1;flex-shrink:0;font-variant-numeric:tabular-nums}
  .card-pct.green{color:var(--green)}.card-pct.yellow{color:var(--yellow)}.card-pct.red{color:var(--red)}
  .card-pct.count{font-size:16px}
  .card-subtitle{color:var(--text-dim);font-size:10.5px;margin-top:-5px;margin-bottom:7px;letter-spacing:.01em}
  .card-note{color:var(--text-dim);font-size:10px;font-style:italic;margin-top:-6px;margin-bottom:7px}
  .progress-track{height:6px;background:var(--bg-3);border-radius:99px;overflow:hidden;margin-bottom:9px}
  .progress-fill{height:100%;border-radius:99px;background:var(--green)}
  .progress-fill.yellow{background:var(--yellow)}.progress-fill.red{background:var(--red)}
  .reset-row{color:var(--text-sec);font-size:11.5px;font-variant-numeric:tabular-nums}

  .card.compact{padding:7px 13px}
  .card.compact .card-header{margin-bottom:5px;align-items:center}
  .card.compact .card-title{line-height:1.2}
  .card.compact .card-pct{font-size:14px}
  .card.compact .card-pct.count{font-size:13px}
  .card.compact .progress-track{height:4px;margin-bottom:0}
  .card.compact .reset-row{display:none}

  .footer{padding:9px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:var(--bg-1)}
  .last-updated{font-size:11px;color:var(--text-dim)}
  .open-link{font-size:11px;color:var(--accent-bright);display:flex;align-items:center;gap:4px}
  .open-link svg{width:10px;height:10px}

  .view-wrap{position:relative;display:flex}
  .view-menu{position:absolute;top:calc(100% + 7px);right:0;width:186px;background:var(--bg-2);border:1px solid var(--border-lt);border-radius:10px;box-shadow:0 14px 34px rgba(0,0,0,.55);padding:5px;z-index:20}
  .view-menu::before{content:"";position:absolute;top:-5px;right:8px;width:9px;height:9px;background:var(--bg-2);border-left:1px solid var(--border-lt);border-top:1px solid var(--border-lt);transform:rotate(45deg)}
  .vm-head{display:flex;align-items:center;justify-content:space-between}
  .vm-title{font-size:10px;letter-spacing:.02em;color:var(--text-dim);font-weight:600;padding:3px 8px 4px}
  .vm-all{font-size:10px;font-weight:600;color:var(--accent-bright);padding:3px 8px 4px}
  .vm-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;color:var(--text-pri)}
  .vm-item.on .vm-check{background:var(--accent);border-color:var(--accent)}
  .vm-check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .vm-check svg{width:10px;height:10px;color:var(--accent-ink);display:none}
  .vm-item.on .vm-check svg{display:block}
  .vm-label{flex:1;display:flex;align-items:center;gap:6px;color:var(--text-pri);white-space:nowrap}
  .vm-label svg{width:12px;height:12px;opacity:.65;color:var(--text-sec)}
  .vm-pct{font-size:11px;color:var(--text-sec);font-variant-numeric:tabular-nums}
  .vm-divider{height:1px;background:var(--border);margin:5px 6px}
  .swatches{display:flex;align-items:center;gap:6px;padding:4px 8px 6px}
  .sw{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-lt);flex-shrink:0}
  .sw.active{box-shadow:0 0 0 2px var(--bg-2),0 0 0 4px var(--accent)}

  .stage{width:1280px;height:800px;overflow:hidden;position:relative;display:flex;align-items:center}
  .stage.dark{background:radial-gradient(130% 120% at 82% 8%,#33231a 0%,#1a1310 55%,#120e0b 100%)}
  .stage.neutral{background:radial-gradient(130% 120% at 50% 0%,#2b2f39 0%,#1c1f26 70%)}
  .stage.split{justify-content:space-between;padding:0 88px}
  .copy{max-width:520px;color:#f6efe8}
  .copy h1{font-size:54px;line-height:1.08;letter-spacing:-.025em;font-weight:800;margin-bottom:20px}
  .copy p{font-size:23px;line-height:1.5;color:#cbbfb3;font-weight:400}
  .stage.neutral .copy p{color:#aeb4bf}
  .device .popup{zoom:1.32}
  .stage.gallery{flex-direction:column;justify-content:center;gap:44px;padding:54px}
  .stage.gallery .copy{max-width:900px;text-align:center}
  .gallery-row{display:flex;gap:38px;justify-content:center;align-items:flex-start}
  .gallery-row .popup{zoom:1}
  .glow{position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(217,119,87,.22),transparent 70%);filter:blur(20px);right:120px;top:120px;pointer-events:none}
</style></head>
<body>
<div id="root"></div>
<script>
const IC={
  pulse:'<svg viewBox="0 0 20 20" fill="none"><polyline points="2,10 5,10 7.5,5 10,15 12.5,7 15,10 18,10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  zap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
  pen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
  rt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
  sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
};
const cls=p=>p<50?'green':p<80?'yellow':'red';
function full(icon,title,pct,reset,sub,note){return `<div class="card"><div class="card-header"><div class="card-title-row">${icon}<span class="card-title">${title}</span></div><span class="card-pct ${cls(pct)}">${pct}%</span></div>${sub?`<div class="card-subtitle">${sub}</div>`:''}${note?`<div class="card-note">${note}</div>`:''}<div class="progress-track"><div class="progress-fill ${cls(pct)}" style="width:${pct}%"></div></div><div class="reset-row">${reset}</div></div>`;}
function comp(icon,title,pct,countTxt){const c=countTxt?cls(Math.round(pct)):cls(pct);return `<div class="card compact"><div class="card-header"><div class="card-title-row">${icon}<span class="card-title">${title}</span></div><span class="card-pct ${countTxt?'count ':''}${c}">${countTxt||pct+'%'}</span></div><div class="progress-track"><div class="progress-fill ${c}" style="width:${pct}%"></div></div></div>`;}
function menu(){return `<div class="view-menu"><div class="vm-head"><span class="vm-title">METRICS</span><span class="vm-all">Select all</span></div>
  <div class="vm-item on"><span class="vm-check">${IC.check}</span><span class="vm-label">${IC.layers}Opus weekly</span><span class="vm-pct">8%</span></div>
  <div class="vm-item on"><span class="vm-check">${IC.check}</span><span class="vm-label">${IC.zap}Sonnet weekly</span><span class="vm-pct">15%</span></div>
  <div class="vm-item on"><span class="vm-check">${IC.check}</span><span class="vm-label">${IC.pen}Claude Design</span><span class="vm-pct">3%</span></div>
  <div class="vm-item on"><span class="vm-check">${IC.check}</span><span class="vm-label">${IC.rt}Routine runs</span><span class="vm-pct">2 / 15</span></div>
  <div class="vm-divider"></div><div class="vm-title">THEME</div>
  <div class="swatches"><span class="sw active" style="background:#d97757"></span><span class="sw" style="background:#4a9eff"></span><span class="sw" style="background:#8250dc"></span><span class="sw" style="background:#15151b"></span><span class="sw" style="background:#faf9f7"></span><span class="sw" style="background:#4f46e5"></span></div></div>`;}
function popup(theme,state,withMenu){
  const S=state==='high'
    ?{s:92,w:76,o:58,so:22,d:9,r:[12,80],rt:'Resets in 1h 02m (12:00 PM)'}
    :{s:22,w:41,o:8,so:15,d:3,r:[2,13],rt:'Resets in 3h 41m (12:00 PM)'};
  return `<div class="popup t-${theme}">
    <div class="header"><div class="header-left"><div class="logo">${IC.pulse}</div><div class="title-block"><span class="app-name">Claude Usage Monitor</span><span class="meta-row"><span class="app-version">v1.6.7</span><span class="plan-badge">Max 5x</span></span></div></div>
      <div class="header-actions"><div class="pill">60m</div><div class="view-wrap"><div class="icon-btn">${IC.sliders}</div>${withMenu?menu():''}</div><div class="icon-btn">${IC.refresh}</div></div></div>
    <div class="cards">
      ${full(IC.clock,'Current Session',S.s,S.rt)}
      ${full(IC.cal,'Weekly · all models',S.w,'Resets in 6d 1h (Mon 15 June 12:00 PM)','Fable draws down 2&times; faster than Opus')}
      ${comp(IC.layers,'Opus weekly',S.o)}
      ${comp(IC.zap,'Sonnet weekly',S.so)}
      ${comp(IC.pen,'Claude Design',S.d)}
      ${comp(IC.rt,'Daily routine runs',S.r[1],S.r[0]+' / 15')}
    </div>
    <div class="footer"><span class="last-updated">Just updated</span><span class="open-link">Open usage page ${IC.ext}</span></div>
  </div>`;
}
const SHOTS={
  hero:{bg:'dark',layout:'split',build:()=>`<div class="glow"></div><div class="copy"><h1>Your Claude limits, at a glance</h1><p>Session, weekly, and per-model usage, right in your browser toolbar. No more opening the settings page.</p></div><div class="device">${popup('clay','healthy',false)}</div>`},
  high:{bg:'dark',layout:'split',build:()=>`<div class="glow"></div><div class="copy"><h1>Know before you hit a limit</h1><p>Color-coded the moment you are getting close, with a live countdown to every reset.</p></div><div class="device">${popup('clay','high',false)}</div>`},
  menu:{bg:'dark',layout:'split',build:()=>`<div class="glow"></div><div class="copy"><h1>Make it yours</h1><p>Show or hide cards and switch between six color themes, right from the popup.</p></div><div class="device">${popup('clay','healthy',true)}</div>`},
  themes:{bg:'neutral',layout:'gallery',build:()=>`<div class="copy"><h1>Six built-in themes</h1><p>From warm dark to clean light. Pick the one that fits your setup.</p></div><div class="gallery-row">${popup('clay','healthy',false)}${popup('paper','healthy',false)}${popup('slate','healthy',false)}</div>`}
};
const shot=(new URLSearchParams(location.search).get('shot'))||'hero';
const cfg=SHOTS[shot]||SHOTS.hero;
document.getElementById('root').outerHTML=`<div class="stage ${cfg.bg} ${cfg.layout}">${cfg.build()}</div>`;
</script>
</body></html>
