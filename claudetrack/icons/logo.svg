<!-- Pulse/wave mark on a clay badge (matches the v1.6+ warm-dark theme). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -18 164 164">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#df8462"/>
      <stop offset="100%" style="stop-color:#c2643f"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd9c8"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="62" fill="rgba(0,0,0,0.12)"/>
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Track -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="9"/>
  <!-- Arc ~70% -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="url(#arcGrad)" stroke-width="9"
    stroke-linecap="round" stroke-dasharray="194 276" stroke-dashoffset="69"
    transform="rotate(-90 64 64)"/>
  <!-- Pulse / heartbeat line -->
  <polyline points="28,64 40,64 48,42 56,86 64,52 72,76 80,64 100,64"
    fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
</svg>
